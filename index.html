<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance System</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎓 Smart Attendance System</h1>
            <p>Face Recognition Powered Attendance</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('mark')">Mark Attendance</button>
            <button class="tab-btn" onclick="showTab('register')">Register Student</button>
            <button class="tab-btn" onclick="showTab('report')">Attendance Report</button>
        </div>

        <!-- Mark Attendance Tab -->
        <div id="mark" class="tab-content active">
            <div class="camera-container">
                <video id="video" width="400" height="300" autoplay muted></video>
                <canvas id="canvas" width="400" height="300" style="display:none;"></canvas>
                <div class="status" id="status">Click "Start Camera" to begin</div>
            </div>
            <div class="form-group">
                <input type="email" id="markEmail" placeholder="Enter your email" required>
                <button id="markAttendanceBtn" onclick="markAttendance()" disabled>Mark Attendance</button>
            </div>
        </div>

        <!-- Register Student Tab -->
        <div id="register" class="tab-content">
            <form id="registerForm" enctype="multipart/form-data">
                <input type="text" id="name" placeholder="Full Name" required>
                <input type="email" id="regEmail" placeholder="Email" required>
                <input type="text" id="studentId" placeholder="Student ID" required>
                <input type="file" id="photo" accept="image/*" required>
                <button type="submit">Register Student</button>
            </form>
        </div>

        <!-- Report Tab -->
        <div id="report" class="tab-content">
            <div class="date-selector">
                <input type="date" id="reportDate">
                <button onclick="loadReport()">Load Report</button>
            </div>
            <div id="reportTable"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
